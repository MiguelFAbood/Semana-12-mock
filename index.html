<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Catálogo de Filmes - TMDB</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <header>
    <h1>🎬 Catálogo de Filmes</h1>
    <p class="subtitle">Populares, agora com busca por nome</p>
  </header>

  <main>
    <section class="search-area">
      <input type="text" id="search" placeholder="Buscar filme...">
      <button id="btnSearch">Buscar</button>
      <button id="btnPopular" class="secondary">Ver populares</button>
    </section>

    <p id="message"></p>

    <div id="movie-list"></div>
  </main>

  <footer>
    <p>Dados fornecidos pela <a href="https://www.themoviedb.org/" target="_blank" rel="noopener">The Movie DB</a></p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
